add_newline = false
command_timeout = 2000
format = """
$directory\
$git_branch\
$python\
$cmd_duration\
$line_break\
$status\
$character"""

[cmd_duration]
style = 'cyan'

[directory]
style = 'cyan'

[git_branch]
format = 'on [$branch ]($style)'
style = 'cyan'

[python]
format = 'Python [(${version} )(\($virtualenv\) )]($style)'
style = 'green'
