source-file ~/.tmux.conf

# runserver window
new-session -s django -n runserver
split-window -v -t django
send-keys -t django:1.1 'cd $TMUX_HOME' C-m
send-keys -t django:1.1 'vex nessie python manage.py runserver 0.0.0.0:8022' C-m
send-keys -t django:1.2 'cd $TMUX_HOME' C-m
send-keys -t django:1.2 'while true; do inotifywait -r -q -e move -e modify -e create -e delete -e close_write --exclude="[^p][^y]$" .; vex nessie tox; done' C-m

# git window
new-window -n git -t django
split-window -h -t django
send-keys -t django:2.1 'cd $TMUX_HOME' C-m
send-keys -t django:2.1 'git branch' C-m
send-keys -t django:2.2 'cd $TMUX_HOME' C-m
send-keys -t django:2.2 'git pull' C-m

# shell window
new-window -n shell -t django
send-keys -t django 'cd $TMUX_HOME' C-m
send-keys -t django:3.1 'vex nessie python manage.py shell' C-m

# return to runserver window
select-window -t django:1
